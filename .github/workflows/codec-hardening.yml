name: Codec Hardening

on:
  pull_request:
  push:

jobs:
  codec-hardening:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hbb_common
        uses: actions/checkout@v4
        with:
          path: hbb_common

      - name: Checkout tests
        uses: actions/checkout@v4
        with:
          repository: RustAdministrator/rustadmin-tests
          token: ${{ secrets.RUSTADMIN_CI_TOKEN || github.token }}
          path: rustdesk-tests

      - name: Run codec hardening gate
        run: ./rustdesk-tests/scripts/run_codec_hardening_ci.sh
